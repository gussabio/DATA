version: 2

models:
  - name: dim_carmake
    description: "Tabla de dimension para Marcas de Autos"
    columns:
      - name: carmake_id
        description: "Identificador de la Marca"
        tests:
          - unique
          - not_null

      - name: carmake
        description: "Nombre de la Marca"
        tests:
          - unique
          - not_null
          - accepted_values:
              arguments:
                column_name: carmake
                values:
                  - Toyota
                  - Ford
                  - Chevrolet
                  - Honda
                  - Audi
                  - BMW
                  - Nissan
              config:
                severity: warn

  - name: dim_salesperson
    description: "Tabla de dimension para Vendedores"
    columns:
      - name: sales_id
        description: "Identificador del Vendedor"
        tests:
          - unique
          - not_null

      - name: salesperson
        description: "Nombre del Vendedor"
        tests:
          - unique
          - not_null

  - name: fact_monthly_sales
    description: "Tabla de hechos de ventas mensuales"
    columns: []